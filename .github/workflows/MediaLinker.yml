name: MediaLinker Builder
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  Docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: MediaLinker-ALl
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKER_USERNAME }}/medialinker:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/medialinker:${{ github.run_number }} \
            -f Dockerfile . --push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: MediaLinker-Emby
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKER_USERNAME }}/medialinker:emby \
            -t ${{ secrets.DOCKER_USERNAME }}/medialinker:emby-${{ github.run_number }} \
            -f Dockerfile-emby . --push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: MediaLinker-Plex
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ${{ secrets.DOCKER_USERNAME }}/medialinker:plex \
            -t ${{ secrets.DOCKER_USERNAME }}/medialinker:plex-${{ github.run_number }} \
            -f Dockerfile-plex . --push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}